services:


  # ── Backend API ──────────────────────────────────────────────────────
  - type:   web
    name:   pharmachain-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key:   NODE_ENV
        value: production
      - key:   PORT
        value: "3001"
      - key:   DATABASE_URL
        fromDatabase:
          name: pharmachain-db
          property: connectionString
      - key:   RPC_URL
        sync: false
      - key:   CHAIN_ID
        value: "80002"
      - key:   DEPLOYER_PRIVATE_KEY
        sync: false
      - key:   JWT_SECRET
        generateValue: true
      - key:   JWT_EXPIRES_IN
        value: "8h"
      - key:   REDIS_URL
        sync: false
      - key:   AES_KEY
        sync: false
      - key:   CORS_ORIGIN
        sync: false


  # ── Frontend React ───────────────────────────────────────────────────
  - type:        static
    name:        pharmachain-app
    rootDir:     frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key:   VITE_API_URL
        sync: false
    routes:
      - type:  rewrite
        source: /*
        destination: /index.html


databases:
  - name: pharmachain-db
    plan: free
    databaseName: pharmachain
    user: pharma

